name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: platform

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: platform/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build admin dashboard
        run: npm run build:admin

      - name: Build client dashboard
        run: npm run build:client

  docker-api:
    runs-on: ubuntu-latest
    needs: typecheck-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t ai-receptionist-api:ci .
        working-directory: platform

      - name: Smoke test container
        run: |
          docker run -d --name api-test -p 3001:3001 \
            -e NODE_ENV=production \
            -e PORT=3001 \
            -e SUPABASE_URL=https://example.supabase.co \
            -e SUPABASE_ANON_KEY=test-anon-key \
            -e SUPABASE_SERVICE_ROLE_KEY=test-service-key \
            -e ENCRYPTION_KEY=ci-test-encryption-key-32chars-min \
            ai-receptionist-api:ci
          sleep 5
          curl -sf http://localhost:3001/health
          docker stop api-test
        working-directory: platform
