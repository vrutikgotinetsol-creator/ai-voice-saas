# Render Blueprint — AI Receptionist SaaS
# Deploy: https://dashboard.render.com → New → Blueprint → connect repo
#
# After deploy, set secret env vars in the Render dashboard (marked sync: false).

services:
  - type: web
    name: ai-receptionist-api
    runtime: docker
    rootDir: platform
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    region: oregon
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PROFESSIONAL
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: GOOGLE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: DEFAULT_VOICE_ID
        value: Elliot
      - key: TRIAL_DAYS
        value: "14"
